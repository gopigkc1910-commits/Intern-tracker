name: Intern Tracker CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  backend-lint:
    name: Backend Syntax & Format Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/api
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Check syntax & formatting with Ruff
        run: |
          # Fast linting without breaking the build on minor issues, but failing on syntax errors
          ruff check .

  frontend-build:
    name: Frontend Application Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/web
        
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: 'npm'
          cache-dependency-path: './apps/web/package-lock.json'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build Next.js application
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          # We don't strictly need API URLs or real DB connections just for a static build check,
          # but we list the required env vars as placeholder strings to pass structural compilation.
          INTERN_TRACKER_DEMO_MODE: "demo"
